name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    name: Build x86_64-linux tarball
    runs-on: [self-hosted, linux, x64, arch]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Toolchain
        run: rustup show active-toolchain || rustup default stable

      - name: Build release
        run: cargo build --release --locked

      - name: Generate completions + manpage
        run: |
          mkdir -p dist/completions dist/man
          ./target/release/strivo completions bash > dist/completions/strivo.bash
          ./target/release/strivo completions zsh  > dist/completions/_strivo
          ./target/release/strivo completions fish > dist/completions/strivo.fish
          ./target/release/strivo man > dist/man/strivo.1

      - name: Stage tarball
        id: stage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="strivo-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p "dist/${PKG}"
          cp target/release/strivo                  "dist/${PKG}/"
          cp README.md LICENSE CHANGELOG.md         "dist/${PKG}/"
          cp -r dist/completions                    "dist/${PKG}/"
          cp -r dist/man                            "dist/${PKG}/"
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"
          (cd dist && sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256")
          echo "pkg=${PKG}" >> "$GITHUB_OUTPUT"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-tarball
          path: |
            dist/${{ steps.stage.outputs.pkg }}.tar.gz
            dist/${{ steps.stage.outputs.pkg }}.tar.gz.sha256

  build-macos:
    name: Build x86_64-apple-darwin tarball
    runs-on: [self-hosted, macos, x64, sonoma]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Toolchain
        run: rustup show active-toolchain || rustup default stable

      - name: Build release
        run: cargo build --release --locked

      - name: Generate completions + manpage
        run: |
          mkdir -p dist/completions dist/man
          ./target/release/strivo completions bash > dist/completions/strivo.bash
          ./target/release/strivo completions zsh  > dist/completions/_strivo
          ./target/release/strivo completions fish > dist/completions/strivo.fish
          ./target/release/strivo man > dist/man/strivo.1

      - name: Stage tarball
        id: stage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="strivo-${VERSION}-x86_64-apple-darwin"
          mkdir -p "dist/${PKG}"
          cp target/release/strivo                  "dist/${PKG}/"
          cp README.md LICENSE CHANGELOG.md         "dist/${PKG}/"
          cp -r dist/completions                    "dist/${PKG}/"
          cp -r dist/man                            "dist/${PKG}/"
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"
          (cd dist && shasum -a 256 "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256")
          echo "pkg=${PKG}" >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-tarball
          path: |
            dist/${{ steps.stage.outputs.pkg }}.tar.gz
            dist/${{ steps.stage.outputs.pkg }}.tar.gz.sha256

  build-windows:
    name: Build x86_64-windows-msvc zip
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Toolchain
        shell: pwsh
        run: rustup show active-toolchain; if (!$?) { rustup default stable }

      - name: Build release
        shell: pwsh
        env:
          FFMPEG_DIR: C:\ffmpeg-win64
        run: cargo build --release --locked

      - name: Generate completions
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\completions | Out-Null
          .\target\release\strivo.exe completions powershell > dist\completions\strivo.ps1

      - name: Stage zip
        id: stage
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v',''
          $PKG = "strivo-$VERSION-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path "dist\$PKG" | Out-Null
          Copy-Item target\release\strivo.exe              "dist\$PKG\"
          Copy-Item README.md, LICENSE, CHANGELOG.md       "dist\$PKG\"
          Copy-Item dist\completions                       "dist\$PKG\completions" -Recurse
          Compress-Archive -Path "dist\$PKG" -DestinationPath "dist\$PKG.zip"
          $hash = (Get-FileHash "dist\$PKG.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $PKG.zip" | Out-File "dist\$PKG.zip.sha256" -Encoding ASCII
          "pkg=$PKG" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-zip
          path: |
            dist/${{ steps.stage.outputs.pkg }}.zip
            dist/${{ steps.stage.outputs.pkg }}.zip.sha256

  publish:
    name: Publish GitHub release
    needs: [build-linux, build-macos, build-windows]
    runs-on: [self-hosted, linux, x64, arch]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/

      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/linux-tarball/*
            dist/macos-tarball/*
            dist/windows-zip/*
          generate_release_notes: true
          body: |
            # strivo ${{ github.ref_name }}

            Alpha release. See [CHANGELOG.md](https://github.com/Chorosyne/strivo/blob/main/CHANGELOG.md) for the human-curated release notes.

            Three platform artifacts:
            - `strivo-*-x86_64-unknown-linux-gnu.tar.gz`
            - `strivo-*-x86_64-apple-darwin.tar.gz`
            - `strivo-*-x86_64-pc-windows-msvc.zip`

            Each carries its own `.sha256` manifest. Verify with `sha256sum -c` (Linux/macOS) or `Get-FileHash` (Windows).
